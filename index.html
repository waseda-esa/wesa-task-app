<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5役タスク</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-header">
    <div class="header-inner">
      <div class="header-top">
        <h1 class="app-title">5役タスク</h1>
        <div class="account-menu-wrap">
          <button type="button" id="accountMenuBtn" class="account-menu-btn" aria-expanded="false" aria-controls="accountMenuPanel">
            <span class="account-menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="account-menu-icon-svg">
                <circle cx="12" cy="12" r="9"></circle>
                <circle cx="12" cy="9" r="3.2"></circle>
                <path d="M7.6 17.6c1.1-2.2 3-3.4 4.4-3.4s3.3 1.2 4.4 3.4"></path>
              </svg>
            </span>
            <span id="accountButtonName" class="account-menu-name">あっす</span>
          </button>
          <div id="accountMenuPanel" class="account-menu-panel">
            <div class="account-menu-label">ログイン中</div>
            <div id="accountCurrentName" class="account-current-name">あっす</div>
            <div class="account-menu-divider"></div>
            <div class="account-menu-label">アカウントを変更</div>
            <div id="accountUserList" class="account-user-list"></div>
            <div class="account-menu-divider"></div>
            <button type="button" id="openCategoryManagerBtn" class="account-menu-action">カテゴリ管理</button>
          </div>
        </div>
      </div>
      <div class="tab-bar">
        <button type="button" id="memberViewBtn" class="tab-button active-view">メンバー別</button>
        <button type="button" id="categoryViewBtn" class="tab-button">カテゴリ別</button>
        <button type="button" id="helpViewBtn" class="tab-button">助けが必要</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <div class="section">
      <div class="filter-grid">
        <div class="my-task-row">
          <label class="my-task-label" for="myTasksOnlyFilter">
            <span class="ios-toggle">
              <input type="checkbox" id="myTasksOnlyFilter">
              <span class="ios-track"></span>
            </span>
            自分のみ
          </label>
        </div>

        <div class="my-task-row">
          <label class="compact-toggle-label" for="compactModeToggle">
            <span class="ios-toggle">
              <input type="checkbox" id="compactModeToggle">
              <span class="ios-track"></span>
            </span>
            簡易表示
          </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="list-header">
        <h2 id="listTitle" class="list-title">メンバー別</h2>
        <div id="taskCount" class="task-count">0件</div>
      </div>

      <div id="taskList"></div>
    </div>
  </div>

  <button type="button" id="openTaskFormBtn" class="add-task-fab">＋ タスク追加</button>

  <div id="taskFormOverlay" class="form-overlay">
    <div class="form-panel">
      <div class="form-header">
        <h2 id="taskFormTitle">タスク追加</h2>
        <button type="button" id="closeTaskFormBtn" class="close-btn">閉じる</button>
      </div>

      <div class="form-body">
        <form id="taskForm">
          <input type="hidden" id="editingTaskId">

          <div class="field-group">
            <label class="field-label" for="title">タスク名</label>
            <input class="field-input" type="text" id="title" required placeholder="例：新歓グループ作成">
          </div>

          <div class="field-group">
            <label class="field-label" for="categorySelect">カテゴリ</label>
            <div class="category-field-row">
              <select class="field-select" id="categorySelect">
                <option value="">未分類</option>
              </select>
              <button type="button" id="openCategoryManagerInlineBtn" class="field-inline-btn">編集</button>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="deadline">期限</label>
            <input class="field-input" type="date" id="deadline">
          </div>

          <div class="field-group">
            <label class="field-label" for="memo">メモ</label>
            <textarea class="field-textarea" id="memo" placeholder="詳細・補足など"></textarea>
          </div>

          <div id="createOnlyFields">
            <div class="field-group">
              <label class="field-label" for="status">ステータス</label>
              <select class="field-select" id="status">
                <option value="未着手">未着手</option>
                <option value="進行中">進行中</option>
                <option value="完了">完了</option>
              </select>
            </div>

            <div class="field-group">
              <label class="inline-check-label">
                <input type="checkbox" id="need_help">
                <span class="check-circle"></span>
                助けが必要
              </label>
            </div>

            <div class="field-group">
              <label class="field-label" for="help_comment">助けてほしい内容</label>
              <input class="field-input" type="text" id="help_comment" placeholder="どんな助けが必要ですか？">
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">担当者</label>
            <div class="assignee-group">
              <div class="assignee-chip"><input type="checkbox" name="assignee" value="あっす" id="a1"><label for="a1">あっす</label></div>
              <div class="assignee-chip"><input type="checkbox" name="assignee" value="しょうぺい" id="a2"><label for="a2">しょうぺい</label></div>
              <div class="assignee-chip"><input type="checkbox" name="assignee" value="よる" id="a3"><label for="a3">よる</label></div>
              <div class="assignee-chip"><input type="checkbox" name="assignee" value="うのりか" id="a4"><label for="a4">うのりか</label></div>
              <div class="assignee-chip"><input type="checkbox" name="assignee" value="たむたむ" id="a5"><label for="a5">たむたむ</label></div>
            </div>
          </div>

          <button type="submit" id="submitTaskBtn" class="submit-btn">追加</button>
        </form>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div id="loadingText" class="loading-text">処理中...</div>
      <div class="loading-subtext">お待ちください</div>
    </div>
  </div>

  <div id="categoryManagerOverlay" class="form-overlay">
    <div class="form-panel category-manager-panel">
      <div class="form-header">
        <h2>カテゴリ管理</h2>
        <button type="button" id="closeCategoryManagerBtn" class="close-btn">閉じる</button>
      </div>

      <div class="form-body">
        <div class="field-group">
          <label class="field-label" for="newCategoryName">新しいカテゴリを追加</label>
          <div class="category-manager-create">
            <input class="field-input" type="text" id="newCategoryName" placeholder="例：新歓">
            <button type="button" id="createCategoryBtn" class="field-inline-btn primary">追加</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">登録済みカテゴリ</label>
          <div id="categoryManagerList" class="category-manager-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <h2 class="login-title">最初にあなたを選んでください</h2>
      <p class="login-text">一度選べば、この端末では自分のみ表示と担当者選択が自動で楽になります。</p>
      <div class="login-select-row">
        <span class="login-select-text">私は</span>
        <select id="loginUserSelect" class="login-select" aria-label="ログインする名前">
          <option value="あっす">あっす</option>
          <option value="しょうぺい">しょうぺい</option>
          <option value="よる">よる</option>
          <option value="うのりか">うのりか</option>
          <option value="たむたむ">たむたむ</option>
        </select>
        <span class="login-select-text">です</span>
      </div>
      <button type="button" id="loginConfirmBtn" class="login-confirm-btn">はじめる</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
